  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== HERO ===== */
    .dh-hero {
      height: 52vh;
      min-height: 340px;
      background: url('https://images.unsplash.com/photo-1499856871958-5b9627545d1a?w=1600&q=80') center/cover no-repeat;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dh-hero::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(0,0,0,.45) 0%, rgba(0,0,0,.65) 100%);
    }
    .dh-hero-text {
      position: relative; z-index: 3;
      text-align: center; color: #fff;
      padding: 0 20px;
    }
    .dh-hero-label {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #f5b942;
      margin-bottom: 14px;
    }
    .dh-hero-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.1;
    }

    /* ===== GRID SECTION ===== */
    .dh-section {
      background: #f5f3ee;
      padding: 60px 0 100px;
      min-height: 350px;
    }
    .dh-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .dh-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #1a3a4f;
      margin-bottom: 36px;
    }
    .dh-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 28px;
    }

    /* ===== CARD ===== */
    .dh-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 16px rgba(0,0,0,.08);
      transition: transform .28s ease, box-shadow .28s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .dh-card:hover {
      transform: translateY(-7px);
      box-shadow: 0 14px 44px rgba(0,0,0,.14);
    }
    .dh-card-thumb {
      width: 100%; height: 210px;
      overflow: hidden;
    }
    .dh-card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .45s ease;
    }
    .dh-card:hover .dh-card-thumb img { transform: scale(1.07); }
    .dh-card-body { padding: 18px 20px 22px; }
    .dh-card-title {
      font-family: 'DM Sans', sans-serif;
      font-size: .98rem;
      font-weight: 600;
      color: #1a3a4f;
      line-height: 1.4;
      min-height: 2.8em;
      margin-bottom: 14px;
    }
    .dh-card-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: #666;
      margin-bottom: 7px;
    }
    .dh-card-meta svg {
      width: 15px; height: 15px;
      flex-shrink: 0;
      color: #e8a045;
    }

    /* ===== EMPTY STATE ===== */
    .dh-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 70px 24px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,.05);
    }
    .dh-empty h3 { font-size: 1.4rem; color:#1a3a4f; margin-bottom: 10px; }
    .dh-empty p  { color: #888; font-size: 1rem; margin-bottom: 28px; }
    .dh-btn {
      display: inline-block;
      background: #e8a045; color: #fff;
      padding: 13px 36px; border-radius: 50px;
      font-family: 'DM Sans', sans-serif; font-weight: 600;
      text-decoration: none; font-size: .95rem;
    }
    .dh-btn:hover { background: #d4913a; }

    @media (max-width: 640px) {
      .dh-grid { grid-template-columns: 1fr; }
      .dh-hero  { height: 40vh; }
    }
  </style>
</head>

document.addEventListener('DOMContentLoaded', function() {
  var params   = new URLSearchParams(window.location.search);
  var dest     = (params.get('dest') || '').toLowerCase().trim();
  var destName = dest ? (dest.charAt(0).toUpperCase() + dest.slice(1)) : 'All';

  // Update page title & meta
  document.getElementById('pageTitle').textContent  = destName + ' Tours – Travel Horizon';
  document.getElementById('dhTitle').textContent     = destName;
  document.getElementById('dhLabel').textContent     = 'Destination';
  document.getElementById('dhHeading').textContent   = destName + ' Tour Packages';

  // Set hero background
  if (heroImages[dest]) {
    document.getElementById('dhHero').style.backgroundImage = "url('" + heroImages[dest] + "')";
  }

  // Filter packages
  var grid = document.getElementById('dhGrid');
  grid.innerHTML = '';

  var results = Object.keys(inlineTours).filter(function(k) {
    return !dest || k === dest || k.indexOf(dest + '-') === 0 || k.indexOf('-' + dest) !== -1;
  });

  if (results.length === 0) {
    grid.innerHTML = '<div class="dh-empty"><h3>No packages found for ' + destName + ' yet.</h3><p>But don\'t worry! We can craft a perfect itinerary for you.</p><a class="dh-btn" href="contact.html">Enquire Now</a></div>';
    return;
  }

  results.forEach(function(key) {
    var t = inlineTours[key];
    var card = '<a class="dh-card" href="tour-detail.html?pkg=' + key + '">' +
      '<div class="dh-card-thumb"><img src="' + t.img + '" alt="' + t.title + '" loading="lazy"></div>' +
      '<div class="dh-card-body">' +
        '<div class="dh-card-title">' + t.title + '</div>' +
        '<div class="dh-card-meta">' +
          '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' +
          t.type +
        '</div>' +
        '<div class="dh-card-meta">' +
          '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>' +
          t.loc +
        '</div>' +
      '</div></a>';
    grid.insertAdjacentHTML('beforeend', card);
  });
});

// Hamburger toggle
document.getElementById('hamburger') && document.getElementById('hamburger').addEventListener('click', function() {
  document.getElementById('navbar').classList.toggle('mobile-open');
});
