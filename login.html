<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Let's Go Tours and Travels</title>
  <meta name="description" content="Admin login portal for Let's Go Tours and Travels dashboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=2" />
  <script src="js/auth.js"></script>
  <script>
    // If already logged in, go straight to dashboard
    document.addEventListener('DOMContentLoaded', function () {
      if (window.Auth && window.Auth.isAuthenticated()) {
        window.location.replace('admin.html');
      }
    });
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b1f35;
      position: relative;
      overflow: hidden;
      padding: 24px;
      font-family: 'DM Sans', sans-serif;
    }

    /* Animated blobs */
    .auth-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: blobFloat 18s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .blob-1 { width: 420px; height: 420px; background: rgba(232,160,69,0.35); top:-10%; left:-8%; }
    .blob-2 { width: 500px; height: 500px; background: rgba(26,58,79,0.55); bottom:-20%; right:-8%; animation-delay:-6s; }
    .blob-3 { width: 280px; height: 280px; background: rgba(42,84,112,0.4); top:40%; left:48%; animation-delay:-11s; }

    @keyframes blobFloat {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(40px,-40px) scale(1.08); }
      100% { transform: translate(-25px,25px) scale(0.92); }
    }

    /* Card container */
    .auth-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 980px;
      min-height: 580px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 32px 64px rgba(0,0,0,0.45);
    }

    /* Left visual panel */
    .auth-visual {
      flex: 1;
      background-image: url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=1000&q=80');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px;
      color: #fff;
      position: relative;
    }
    .auth-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(11,31,53,0.85) 0%, rgba(232,160,69,0.35) 100%);
    }
    .auth-visual-inner { position: relative; z-index: 2; }
    .auth-logo-img { height: 42px; filter: brightness(0) invert(1); margin-bottom: 60px; display: block; }
    .auth-visual h2 { font-family: 'Playfair Display', serif; font-size: 2.6rem; line-height: 1.15; margin-bottom: 14px; }
    .auth-visual p  { font-size: 15px; opacity: 0.88; max-width: 300px; line-height: 1.65; }

    /* Default admin hint badge */
    .auth-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,160,69,0.2);
      border: 1px solid rgba(232,160,69,0.4);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: #f0b55a;
      line-height: 1.5;
      margin-top: 28px;
    }

    /* Right forms panel */
    .auth-forms-wrap {
      flex: 1;
      padding: 48px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #fff;
      position: relative;
    }

    /* Tab switcher */
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      background: #f1f5f9;
      border-radius: 12px;
      padding: 4px;
    }
    .auth-tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .auth-tab-btn.active {
      background: #fff;
      color: #0b1f35;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* Forms */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-header { margin-bottom: 24px; }
    .form-header h3 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #0b1f35; margin-bottom: 6px; }
    .form-header p  { color: #64748b; font-size: 14px; }

    .field { margin-bottom: 18px; position: relative; }
    .field label { display: block; font-size: 12px; font-weight: 700; color: #334155; margin-bottom: 7px; letter-spacing: 0.3px; }
    .field input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #1e293b;
      background: #f8fafc;
      transition: all 0.25s ease;
      outline: none;
    }
    .field input:focus {
      border-color: #e8a045;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(232,160,69,0.12);
    }
    .field-icon {
      position: absolute;
      left: 14px;
      top: 34px;
      font-size: 16px;
      color: #94a3b8;
      pointer-events: none;
    }

    /* Error message */
    .auth-error {
      display: none;
      align-items: center;
      gap: 8px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      color: #dc2626;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .auth-error.visible { display: flex; }

    /* Success toast */
    .auth-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #0b1f35;
      color: #fff;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999;
      white-space: nowrap;
    }
    .auth-toast.show { transform: translateX(-50%) translateY(0); }

    /* Submit button */
    .auth-submit {
      width: 100%;
      padding: 14px;
      background: #0b1f35;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.28s ease;
      position: relative;
      overflow: hidden;
      margin-top: 6px;
    }
    .auth-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }
    .auth-submit:hover::after { transform: translateX(100%); }
    .auth-submit:hover { background: #e8a045; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(232,160,69,0.3); }
    .auth-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Back to site link */
    .back-site {
      position: absolute;
      top: 24px; right: 24px;
      font-size: 13px;
      color: #94a3b8;
      text-decoration: none;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.2s;
    }
    .back-site:hover { color: #0b1f35; }

    @media (max-width: 820px) {
      .auth-container { flex-direction: column; min-height: auto; border-radius: 20px; }
      .auth-visual { min-height: 200px; padding: 28px; }
      .auth-visual h2 { font-size: 1.8rem; }
      .auth-visual p, .auth-hint { display: none; }
      .auth-forms-wrap { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-blob blob-1"></div>
  <div class="auth-blob blob-2"></div>
  <div class="auth-blob blob-3"></div>

  <div class="auth-container">

    <!-- Visual left panel -->
    <div class="auth-visual">
      <div class="auth-visual-inner">
        <a href="index.html"><img src="lets_go_logo.png?v=4" alt="Let's Go Tours" class="auth-logo-img"></a>
      </div>
      <div class="auth-visual-inner">
        <h2>Admin<br>Dashboard</h2>
        <p>Manage tour packages, update itineraries, and keep your travel listings fresh.</p>
        <div class="auth-hint">
          🔑 Default: <strong>admin@letsgo.com</strong> / <strong>Admin@123</strong>
        </div>
      </div>
    </div>

    <!-- Forms right panel -->
    <div class="auth-forms-wrap">
      <a href="index.html" class="back-site">✕ Back to site</a>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab-btn active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab-btn" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div class="auth-form active" id="formLogin">
        <div class="form-header">
          <h3>Welcome back</h3>
          <p>Sign in to access the admin dashboard.</p>
        </div>
        <div class="auth-error" id="loginError">⚠ <span id="loginErrorMsg"></span></div>
        <div class="field">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" placeholder="admin@letsgo.com" autocomplete="username" />
          <span class="field-icon">✉</span>
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" />
          <span class="field-icon">🔒</span>
        </div>
        <button class="auth-submit" id="loginBtn" onclick="handleLogin()">Sign In →</button>
      </div>

      <!-- SIGNUP FORM -->
      <div class="auth-form" id="formSignup">
        <div class="form-header">
          <h3>Create account</h3>
          <p>Register a new admin account.</p>
        </div>
        <div class="auth-error" id="signupError">⚠ <span id="signupErrorMsg"></span></div>
        <div class="field">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" placeholder="Your name" autocomplete="name" />
          <span class="field-icon">👤</span>
        </div>
        <div class="field">
          <label for="signupEmail">Email Address</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="username" />
          <span class="field-icon">✉</span>
        </div>
        <div class="field">
          <label for="signupPassword">Password <span style="color:#94a3b8;font-weight:400;">(min 6 chars)</span></label>
          <input type="password" id="signupPassword" placeholder="Create a password" autocomplete="new-password" />
          <span class="field-icon">🔒</span>
        </div>
        <button class="auth-submit" id="signupBtn" onclick="handleSignup()">Create Account →</button>
      </div>

    </div><!-- end forms-wrap -->
  </div><!-- end container -->
</div>

<!-- Toast notification -->
<div class="auth-toast" id="authToast"></div>

<script>
  // ── Tab switching ──
  function switchTab(tab) {
    var isLogin = tab === 'login';
    document.getElementById('formLogin').classList.toggle('active', isLogin);
    document.getElementById('formSignup').classList.toggle('active', !isLogin);
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabSignup').classList.toggle('active', !isLogin);
    // Clear errors
    hideError('loginError');
    hideError('signupError');
  }

  // ── Error helpers ──
  function showError(id, msgId, msg) {
    document.getElementById(msgId).textContent = msg;
    document.getElementById(id).classList.add('visible');
  }
  function hideError(id) {
    document.getElementById(id).classList.remove('visible');
  }

  // ── Toast ──
  function showToast(msg) {
    var t = document.getElementById('authToast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function () { t.classList.remove('show'); }, 3000);
  }

  // ── Login ──
  function handleLogin() {
    hideError('loginError');
    var email    = document.getElementById('loginEmail').value;
    var password = document.getElementById('loginPassword').value;
    var btn      = document.getElementById('loginBtn');

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    setTimeout(function () {
      var result = window.Auth.signIn(email, password);
      if (result.success) {
        showToast('✓ Signed in! Redirecting…');
        setTimeout(function () { window.location.href = 'admin.html'; }, 900);
      } else {
        showError('loginError', 'loginErrorMsg', result.error);
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    }, 400); // slight delay for UX feel
  }

  // ── Sign Up ──
  function handleSignup() {
    hideError('signupError');
    var name     = document.getElementById('signupName').value;
    var email    = document.getElementById('signupEmail').value;
    var password = document.getElementById('signupPassword').value;
    var btn      = document.getElementById('signupBtn');

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    setTimeout(function () {
      var result = window.Auth.signUp(name, email, password);
      if (result.success) {
        showToast('✓ Account created! Redirecting…');
        setTimeout(function () { window.location.href = 'admin.html'; }, 900);
      } else {
        showError('signupError', 'signupErrorMsg', result.error);
        btn.disabled = false;
        btn.textContent = 'Create Account →';
      }
    }, 400);
  }

  // ── Enter key support ──
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    var loginActive = document.getElementById('formLogin').classList.contains('active');
    if (loginActive) handleLogin();
    else handleSignup();
  });

  // ── Auto-open signup if directed from elsewhere ──
  if (sessionStorage.getItem('openSignup') === 'true') {
    sessionStorage.removeItem('openSignup');
    switchTab('signup');
  }
</script>
</body>
</html>
